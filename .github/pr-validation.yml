version: 1

status:
  context: "intelligent-pr-validation"
  target_url: ""

setup:
  commands:
    - "uv venv"
    - "uv pip install -e ."
  timeout_seconds: 600

tests:
  command: "uv run pytest -q --maxfail=1"
  timeout_seconds: 900
  parallel_hint: ""
  log_max_bytes: 120000

reviewers:
  request_review_when_passed: false
  fallback_reviewers: []
  fallback_teams: []

labels:
  enabled: true
  remove_stale: true
  create_missing: true
  test_failed: "test-failed"
  needs_tests: "needs-tests"
  ready_for_review: "ready-for-review"
  merge_conflict: "merge-conflict"

code_review:
  enabled: false
  command: ""
  timeout_seconds: 600
  log_max_bytes: 40000

auto_merge:
  enabled: false
  method: "SQUASH"

comments:
  marker: "<!-- pr-validation-agent:summary -->"
  max_log_lines: 120

